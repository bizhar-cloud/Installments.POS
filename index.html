<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZHAR COMPUTER | AUTO-SYNC POS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --primary: #2563eb; 
            --neon-blue: #00d2ff; --neon-purple: #9d50bb; --border: #cbd5e1; --success: #10b981; --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg: #050b18; --card: #111a2e; --text: #f1f5f9; --primary: #3b82f6; 
            --neon-blue: #00f2ff; --neon-purple: #bd00ff; --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s ease; overflow-x: hidden; }

        header { 
            background: var(--card); height: 75px; padding: 0 25px; 
            border-bottom: 2px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }

        .brand { font-weight: 900; font-size: 22px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .settings-btn { 
            width: 45px; height: 45px; border-radius: 12px; background: var(--bg);
            color: var(--neon-blue); display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: 2px solid var(--neon-blue); font-size: 20px; transition: 0.3s;
        }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .menu-overlay.show { display: flex; }

        .dropdown-menu { 
            background: var(--card); border: 2px solid var(--neon-blue); border-radius: 25px; width: 300px; 
            display: flex; flex-direction: column; padding: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .menu-item { 
            display: flex; align-items: center; gap: 15px; padding: 14px 18px; 
            border-radius: 15px; cursor: pointer; color: var(--text); font-size: 15px; 
            border: none; background: none; width: 100%; text-align: inherit; font-weight: 700;
            transition: 0.2s; margin-bottom: 5px;
        }
        .menu-item:hover { background: var(--bg); color: var(--neon-blue); }
        .menu-item i { font-size: 18px; color: var(--neon-purple); }

        .container { width: 100%; max-width: 1400px; margin: 25px auto; padding: 0 15px; }
        .pc-mode-active { display: grid !important; grid-template-columns: 380px 1fr !important; gap: 25px; }
        .card { background: var(--card); padding: 25px; border-radius: 22px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: var(--shadow); }
        input, select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); margin-top: 8px; outline: none; }
        
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: white; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .price-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .summary-box { background: var(--bg); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        
        .table-wrap { background: var(--card); border-radius: 18px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: inherit; }
        th { background: var(--bg); color: var(--neon-blue); }

        .btn-sm { width: 35px; height: 35px; border-radius: 10px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(5px); }
        .stat-box { padding: 15px; border-radius: 15px; border-right: 5px solid var(--neon-blue); background: var(--card); box-shadow: var(--shadow); }
        
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body id="app-body">

<header>
    <div style="width: 45px;"></div>
    <div class="brand">BIZHAR COMPUTER</div>
    <div class="settings-container">
        <button class="settings-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
    </div>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()">
    <div class="dropdown-menu" onclick="event.stopPropagation()">
        <div style="text-align: center; margin-bottom: 15px;">
             <h4 id="m-header" style="color:var(--neon-blue)">زمان و ڕێکخستن</h4>
             <hr style="opacity:0.1; margin-top:10px">
        </div>
        <button class="menu-item" onclick="toggleLayout()"><i class="fa-solid fa-desktop"></i> <span id="m-pc">PC Mode</span></button>
        <button class="menu-item" onclick="toggleDark()"><i class="fa-solid fa-moon"></i> <span id="m-dark">Dark Mode</span></button>
        <button class="menu-item" onclick="exportData()"><i class="fa-solid fa-download"></i> <span id="m-backup">Backup</span></button>
        <button class="menu-item" onclick="showAddInv()"><i class="fa-solid fa-boxes-stacked"></i> <span id="m-add">Inventory</span></button>
        <hr style="opacity: 0.1; margin: 10px 0;">
        <div style="padding: 5px 10px;">
            <select id="lang-sel" onchange="applyLang()" style="margin-top:0; height: 45px; border:1px solid var(--neon-blue)">
                <option value="ku">کوردی (بادینی)</option>
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="tr">Türkçe</option>
                <option value="fa">فارسی</option>
            </select>
        </div>
        <button class="main-btn" onclick="toggleMenu()" id="btn-close" style="background:#475569; padding:10px; font-size:12px; margin-top:15px">داخستن</button>
    </div>
</div>

<div class="container" id="app-container">
    <div id="side-p">
        <div class="card">
            <h3 id="t-form" style="font-weight:900; color:var(--neon-blue); margin-bottom:15px;"><i class="fa-solid fa-plus-circle"></i> تۆمارکرن</h3>
            <div id="scanner" style="display:none; margin-bottom:15px; border-radius: 12px; overflow: hidden;"></div>
            
            <label id="l-name" style="font-size:13px; font-weight:700;">ناڤێ کڕیاری</label>
            <input type="text" id="i-name" placeholder="...">

            <label id="l-item" style="font-size:13px; font-weight:700; margin-top:15px; display:block;">ئامێر</label>
            <div style="display:flex; gap:8px;">
                <select id="i-item"></select>
                <button onclick="startScan()" class="main-btn" style="margin:8px 0 0 0; width:55px; height:48px; background: var(--text); color: var(--card);"><i class="fa-solid fa-qrcode"></i></button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:15px;">
                <div><label id="l-buy" style="font-size:12px; font-weight:700;">کڕین $</label><input type="number" id="i-buy" oninput="calc()"></div>
                <div><label id="l-down" style="font-size:12px; font-weight:700;">پێشەکی $</label><input type="number" id="i-down" oninput="calc()"></div>
            </div>

            <label id="l-duration" style="font-size:13px; font-weight:700; margin-top:15px; display:block;">ماوە</label>
            <select id="i-months" onchange="calc()">
                <option value="6">6 Months</option>
                <option value="12">12 Months</option>
                <option value="16">16 Months</option>
            </select>

            <div class="price-summary">
                <div class="summary-box">
                    <small id="l-total-box" style="font-weight:700; opacity:0.6;">Total</small>
                    <div id="o-total" style="font-weight:900; color:var(--neon-purple); font-size:18px;">$ 0</div>
                </div>
                <div class="summary-box">
                    <small id="l-mon" style="font-weight:700; opacity:0.6;">Monthly</small>
                    <div id="o-mon" style="font-weight:900; color:var(--neon-blue); font-size:18px;">$ 0</div>
                </div>
            </div>

            <button class="main-btn" onclick="saveSale()"><i class="fa-solid fa-save"></i> <span id="b-save">تۆمارکرن</span></button>
        </div>
    </div>

    <div id="main-p">
        <div class="stats" style="display: grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom: 20px;">
            <div class="stat-box" style="border-color: var(--neon-purple);"><small id="s1">مەخزەن</small><h3 id="v1">0</h3></div>
            <div class="stat-box" style="border-color: var(--success);"><small id="s4">قازانج</small><h3 id="v4" style="color:var(--success)">0$</h3></div>
        </div>
        <input type="text" id="search-input" placeholder="Search..." oninput="render()" style="margin-bottom:20px;">
        <div class="table-wrap">
            <table>
                <thead><tr>
                    <th id="th1">کڕیار</th><th id="th2">ئامێر</th><th id="th3">گشتی</th><th id="th_down">پێشەکی</th><th id="th4">قیست</th><th id="th5">کردار</th>
                </tr></thead>
                <tbody id="sales-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modal-inv">
    <div class="card" style="width:90%; max-width:400px; border:none;">
        <h3 id="m-title" style="margin-bottom:15px; color:var(--neon-blue);">Inventory</h3>
        <input type="text" id="add-name" placeholder="Name">
        <input type="text" id="add-barcode" placeholder="Barcode">
        <input type="number" id="add-qty" placeholder="Qty">
        <button class="main-btn" id="btn-add-confirm" onclick="addInv()">Confirm</button>
        <button class="main-btn" id="btn-add-close" onclick="document.getElementById('modal-inv').style.display='none'" style="background:#475569; margin-top:8px;">Close</button>
    </div>
</div>

<div id="print-area" style="display:none; padding:40px; text-align:center;"></div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inv = [], sales = [];

    const langs = {
        ku: { dir: "rtl", mhead: "زمان و ڕێکخستن", tform: "تۆمارکرنا نوی", lname: "ناڤێ کڕیاری", litem: "هەلبژارتنا ئامێری", lbuy: "بهایێ کڕینێ $", ldown: "پێشەکی $", lduration: "ماوێ قیستێ", lmon: "قیستا هەیڤانە", ltotal: "کۆمێ گشتی", bsave: "پاشکەفتکرن", s1: "کۆگە (پارچە)", s4: "کۆما قازانجی", th1: "کڕیار", th2: "ئامێر", th3: "کۆمێ گشتی", th_down: "پێشەکی", th4: "قیستێن دای", th5: "کردار", mpc: "مودێ کۆمپیوتەری", mdark: "مودێ تاریك", mbackup: "پاراستنا کۆپیەکێ", madd: "کۆگە (مەخزەن)", mtitle: "زێدەکرنا ئامێری", bclose: "داخستن", bconf: "تۆمارکرن" },
        ar: { dir: "rtl", mhead: "اللغة والإعدادات", tform: "تسجيل جديد", lname: "اسم الزبون", litem: "الجهاز", lbuy: "سعر الشراء $", ldown: "المقدمة $", lduration: "مدة الأقساط", lmon: "القسط الشهري", ltotal: "المجموع الكلي", bsave: "حفظ البيانات", s1: "المخزن (قطع)", s4: "إجمالي الأرباح", th1: "الزبون", th2: "الجهاز", th3: "المجموع", th_down: "المقدمة", th4: "الأقساط", th5: "إجراء", mpc: "وضع الكمبيوتر", mdark: "الوضع الليلي", mbackup: "نسخة احتياطية", madd: "المخزن", mtitle: "إضافة جهاز جديد", bclose: "إغلاق", bconf: "تأكيد" },
        en: { dir: "ltr", mhead: "Language & Settings", tform: "New Registration", lname: "Customer Name", litem: "Select Item", lbuy: "Cost Price $", ldown: "Down Payment $", lduration: "Installment Period", lmon: "Monthly Payment", ltotal: "Grand Total", bsave: "Save Record", s1: "Stock (Qty)", s4: "Total Profit", th1: "Customer", th2: "Item", th3: "Total", th_down: "DownPay", th4: "Paid", th5: "Action", mpc: "PC Mode", mdark: "Dark Mode", mbackup: "Backup Data", madd: "Inventory", mtitle: "Add Item", bclose: "Close", bconf: "Confirm" },
        tr: { dir: "ltr", mhead: "Dil ve Ayarlar", tform: "Yeni Kayıt", lname: "Müşteri Adı", litem: "Cihaz Seçimi", lbuy: "Alış Fiyatı $", ldown: "Peşinat $", lduration: "Taksit Süresi", lmon: "Aylık Taksit", ltotal: "Toplam Tutar", bsave: "Kaydet", s1: "Stok (Adet)", s4: "Toplam Kar", th1: "Müşteri", th2: "Cihaz", th3: "Toplam", th_down: "Peşinat", th4: "Ödenen", th5: "İşlem", mpc: "Bilgisayar Modu", mdark: "Karanlık Mod", mbackup: "Yedekle", madd: "Envanter", mtitle: "Cihaz Ekle", bclose: "Kapat", bconf: "Onayla" },
        fa: { dir: "rtl", mhead: "زبان و تنظیمات", tform: "ثبت نام جدید", lname: "نام مشتری", litem: "انتخاب کالا", lbuy: "قیمت خرید $", ldown: "پیش‌پرداخت $", lduration: "مدت اقساط", lmon: "قسط ماهیانه", ltotal: "مجموع کل", bsave: "ذخیره کردن", s1: "موجودی انبار", s4: "سود کل", th1: "مشتری", th2: "کالا", th3: "مجموع", th_down: "پیش‌پرداخت", th4: "اقساط", th5: "عملیات", mpc: "حالت کامپیوتر", mdark: "حالت شب", mbackup: "نسخه پشتیبان", madd: "انبار", mtitle: "افزودن کالا", bclose: "بستن", bconf: "تایید" }
    };

    function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('show'); }
    function toggleLayout() { document.getElementById('app-container').classList.toggle('pc-mode-active'); toggleMenu(); }
    function toggleDark() { document.body.classList.toggle('dark-mode'); toggleMenu(); }
    function showAddInv() { document.getElementById('modal-inv').style.display='flex'; toggleMenu(); }

    db.ref('/').on('value', snap => { const d = snap.val(); if(d){ inv=d.i||[]; sales=d.s||[]; render(); } });

    function applyLang() {
        const l = langs[document.getElementById('lang-sel').value] || langs.ku;
        document.body.dir = l.dir;
        document.getElementById('m-header').innerText = l.mhead;
        document.getElementById('t-form').innerHTML = `<i class="fa-solid fa-plus-circle"></i> ${l.tform}`;
        document.getElementById('l-name').innerText = l.lname; 
        document.getElementById('l-item').innerText = l.litem;
        document.getElementById('l-buy').innerText = l.lbuy; 
        document.getElementById('l-down').innerText = l.ldown;
        document.getElementById('l-duration').innerText = l.lduration; 
        document.getElementById('l-mon').innerText = l.lmon;
        document.getElementById('l-total-box').innerText = l.ltotal;
        document.getElementById('b-save').innerText = l.bsave; 
        document.getElementById('s1').innerText = l.s1;
        document.getElementById('s4').innerText = l.s4; 
        document.getElementById('th1').innerText = l.th1;
        document.getElementById('th2').innerText = l.th2; 
        document.getElementById('th3').innerText = l.th3;
        document.getElementById('th_down').innerText = l.th_down; 
        document.getElementById('th4').innerText = l.th4; 
        document.getElementById('th5').innerText = l.th5; 
        document.getElementById('m-pc').innerText = l.mpc; 
        document.getElementById('m-dark').innerText = l.mdark; 
        document.getElementById('m-backup').innerText = l.mbackup; 
        document.getElementById('m-add').innerText = l.madd; 
        document.getElementById('m-title').innerText = l.mtitle;
        document.getElementById('btn-close').innerText = l.bclose;
        document.getElementById('btn-add-close').innerText = l.bclose;
        document.getElementById('btn-add-confirm').innerText = l.bconf;
        render();
    }

    function calc() {
        let b = parseFloat(document.getElementById('i-buy').value)||0, d = parseFloat(document.getElementById('i-down').value)||0, m = parseInt(document.getElementById('i-months').value);
        let rates = {6:0.4, 12:0.55, 16:0.75};
        let total = b + (b * (rates[m]||0.4)), mon = (total - d) / m;
        document.getElementById('o-mon').innerText = "$ " + (mon > 0 ? mon.toFixed(2) : 0);
        document.getElementById('o-total').innerText = "$ " + total.toFixed(2);
        return { total, mon, b, d, m };
    }

    function updateCloud() { db.ref('/').set({ i: inv, s: sales }); }

    function saveSale() {
        let n = document.getElementById('i-name').value, i = document.getElementById('i-item').value;
        if(!n || !i) return alert("Please fill details!");
        let p = calc(), idx = inv.findIndex(x => x.name === i);
        if(idx!==-1) inv[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), buy:p.b, down:p.d, mon:p.mon.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleDateString() });
        updateCloud();
        document.getElementById('i-name').value = "";
    }

    function addInv() {
        let n = document.getElementById('add-name').value, b = document.getElementById('add-barcode').value, q = parseInt(document.getElementById('add-qty').value);
        if(n && q){ inv.push({name:n, barcode:b, qty:q}); updateCloud(); document.getElementById('modal-inv').style.display='none'; }
    }

    function render() {
        document.getElementById('v1').innerText = inv.reduce((a,b)=>a+b.qty,0);
        let pro=0, query = document.getElementById('search-input').value.toLowerCase();
        sales.forEach(s => { pro += (parseFloat(s.total) - parseFloat(s.buy)); });
        document.getElementById('v4').innerText = pro.toFixed(0) + "$";
        let sel = document.getElementById('i-item'), list = document.getElementById('sales-list');
        sel.innerHTML = '<option value="">...</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name}</option>`; });
        list.innerHTML = '';
        sales.filter(s => s.name.toLowerCase().includes(query)).forEach(s => {
            list.innerHTML += `<tr>
                <td><b>${s.name}</b><br><small style="opacity:0.6">${s.date}</small></td><td>${s.item}</td><td>${s.total}$</td><td>${s.down}$</td><td><span style="color:var(--neon-blue)">${s.paid}</span> / ${s.months}</td>
                <td class="action-btns">
                    <button onclick="pay(${s.id})" class="btn-sm" style="background:var(--success)"><i class="fa-solid fa-plus"></i></button>
                    <button onclick="printSale(${s.id})" class="btn-sm" style="background:var(--primary)"><i class="fa-solid fa-print"></i></button>
                    <button onclick="delS(${s.id})" class="btn-sm" style="background:var(--danger)"><i class="fa-solid fa-trash"></i></button>
                </td></tr>`;
        });
    }

    function pay(id) { let s=sales.find(x=>x.id===id); if(s && s.paid < s.months){ s.paid++; updateCloud(); } }
    function delS(id) { if(confirm("Are you sure?")){ sales=sales.filter(x=>x.id!==id); updateCloud(); } }
    
    function printSale(id) {
        let s = sales.find(x => x.id === id);
        let p = document.getElementById('print-area');
        p.innerHTML = `<h2>BIZHAR COMPUTER</h2><hr><p>${s.name}</p><p>${s.item}</p><p>${s.total}$</p><p>${s.date}</p>`;
        window.print();
    }

    function exportData() {
        let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({i:inv, s:sales}));
        let dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "BIZHAR_BACKUP.json"); dl.click();
    }
    
    function startScan() {
        document.getElementById('scanner').style.display = 'block';
        let sc = new Html5QrcodeScanner("scanner", { fps: 15, qrbox: 250 });
        sc.render((txt) => {
            let f = inv.find(x => x.barcode === txt);
            if(f) { document.getElementById('i-item').value = f.name; sc.clear(); document.getElementById('scanner').style.display='none'; }
        });
    }
    applyLang();
</script>
</body>
</html>
