<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZHAR COMPUTER | PRO POS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #00f2ff; --bg: #0b0e14; --card: #161b22; --text: #ffffff; --border: rgba(255,255,255,0.1);
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a; --border: #d1d9e6; --primary: #0072ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

        /* Layout Container */
        .container { display: flex; flex-direction: column; min-height: 100vh; }

        /* Top Header */
        header { 
            padding: 15px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .brand-title { font-weight: 900; color: var(--primary); margin: 0; font-size: 18px; }

        /* Main Form Section */
        .input-section { padding: 15px; background: var(--card); margin: 10px; border-radius: 15px; border: 1px solid var(--border); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.7; }
        input, select { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); 
            border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
        }
        body.light-mode input, body.light-mode select { background: #f9f9f9; }

        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-box h3 { margin: 5px 0 0; color: var(--primary); font-size: 16px; }

        /* Table Section */
        .list-section { padding: 10px; margin-bottom: 80px; }
        .table-wrapper { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: right; padding: 12px; background: rgba(0,0,0,0.1); font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        /* Buttons */
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add { background: var(--primary); color: #000; margin-top: 10px; }
        .btn-tool { background: var(--border); color: var(--text); padding: 8px; border-radius: 8px; width: auto; display: inline-flex; }

        /* Monthly Display Box */
        .result-box { 
            background: rgba(0, 242, 255, 0.1); padding: 15px; border-radius: 12px; 
            text-align: center; margin: 15px 0; border: 1px dashed var(--primary);
        }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto; }

        /* Tablet & Desktop */
        @media (min-width: 768px) {
            .container { flex-direction: row; }
            .sidebar { width: 350px; height: 100vh; position: sticky; top: 0; }
            .main { flex: 1; padding: 20px; }
            .stats-row { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body class="dark-mode">

<div class="container">
    <div class="sidebar">
        <header>
            <h1 class="brand-title">BIZHAR COMPUTER</h1>
            <div style="display:flex; gap:8px;">
                <button class="btn-tool" onclick="toggleTheme()"><i id="t-icon" class="fa-solid fa-sun"></i></button>
                <select id="lang" onchange="setLang()" style="width: auto; padding: 5px;">
                    <option value="ku">KU</option>
                    <option value="ar">AR</option>
                    <option value="en">EN</option>
                </select>
            </div>
        </header>

        <div class="input-section">
            <div class="form-group">
                <label id="l-name">ناڤێ کڕیاری</label>
                <input type="text" id="c-name" placeholder="...">
            </div>
            <div class="form-group">
                <label id="l-item">ئامێر</label>
                <select id="item-sel"></select>
            </div>
            <div class="grid-inputs">
                <div class="form-group">
                    <label id="l-cost">بها $</label>
                    <input type="number" id="cost" oninput="recalc()">
                </div>
                <div class="form-group">
                    <label id="l-down">پێشەکی $</label>
                    <input type="number" id="down" oninput="recalc()">
                </div>
            </div>
            <div class="form-group">
                <label id="l-months">ماوێ قیستێ</label>
                <select id="months" onchange="recalc()">
                    <option value="6">6 Months (38%)</option>
                    <option value="8">8 Months (45%)</option>
                    <option value="12">12 Months (56%)</option>
                    <option value="16">16 Months (75%)</option>
                </select>
            </div>
            <div class="result-box">
                <small id="l-mon-label">هەیڤانە (Monthly)</small>
                <div id="mon-out" style="font-size: 24px; font-weight: 900; color: var(--primary);">0.00 $</div>
            </div>
            <button class="btn btn-add" onclick="save()"><i class="fa-solid fa-plus"></i> <span id="l-save">تۆمارکرن</span></button>
            <button class="btn btn-tool" style="width:100%; margin-top:10px;" onclick="openAdmin()"><i class="fa-solid fa-cog"></i> <span id="l-admin">ڕێکخستن</span></button>
        </div>
    </div>

    <div class="main">
        <div class="stats-row">
            <div class="stat-box"><small id="s-inv">مەخزەن</small><h3 id="c-inv">0</h3></div>
            <div class="stat-box"><small id="s-cust">کڕیار</small><h3 id="c-cust">0</h3></div>
            <div class="stat-box"><small id="s-debt">قەرز</small><h3 id="c-debt">0$</h3></div>
            <div class="stat-box"><small id="s-inc">داهات</small><h3 id="c-inc">0$</h3></div>
        </div>

        <div class="list-section">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th id="th-n">کڕیار</th>
                            <th id="th-i">ئامێر</th>
                            <th id="th-t">گشتی</th>
                            <th id="th-r">باقی</th>
                            <th id="th-a">کردار</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div style="max-width:400px; margin:auto; background:var(--card); padding:20px; border-radius:15px;">
        <h3>Stock / مەخزەن</h3>
        <input type="text" id="st-name" placeholder="Item Name"><br><br>
        <input type="number" id="st-qty" placeholder="Qty"><br><br>
        <button class="btn btn-add" onclick="addSt()">+ Add Stock</button>
        <button class="btn btn-tool" style="width:100%; margin-top:10px;" onclick="closeAdmin()">Close</button>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inv = [], sales = [];

    // Language Data
    const i18n = {
        ku: { name:"ناڤێ کڕیاری", item:"ئامێر", cost:"بها", down:"پێشەکی", months:"ماوێ قیستێ", save:"تۆمارکرن", adm:"ڕێکخستن", sinv:"مەخزەن", scust:"کڕیار", sdebt:"قەرز", sinc:"داهات", thn:"کڕیار", thi:"ئامێر", tht:"گشتی", thr:"باقی", tha:"کردار" },
        en: { name:"Customer", item:"Item", cost:"Cost", down:"Down", months:"Months", save:"Save", adm:"Settings", sinv:"Stock", scust:"Cust", sdebt:"Debt", sinc:"Income", thn:"Name", thi:"Item", tht:"Total", thr:"Rem", tha:"Act" }
    };

    function setLang() {
        let l = document.getElementById('lang').value;
        let t = i18n[l] || i18n.en;
        document.body.dir = (l === 'en') ? 'ltr' : 'rtl';
        document.getElementById('l-name').innerText = t.name;
        document.getElementById('l-item').innerText = t.item;
        document.getElementById('l-cost').innerText = t.cost;
        document.getElementById('l-down').innerText = t.down;
        document.getElementById('l-months').innerText = t.months;
        document.getElementById('l-save').innerText = t.save;
        document.getElementById('l-admin').innerText = t.adm;
        document.getElementById('s-inv').innerText = t.sinv;
        document.getElementById('s-cust').innerText = t.scust;
        document.getElementById('s-debt').innerText = t.sdebt;
        document.getElementById('s-inc').innerText = t.sinc;
        document.getElementById('th-n').innerText = t.thn;
        document.getElementById('th-i').innerText = t.thi;
        document.getElementById('th-t').innerText = t.tht;
        document.getElementById('th-r').innerText = t.thr;
        document.getElementById('th-a').innerText = t.tha;
        ui();
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        let icon = document.getElementById('t-icon');
        icon.className = icon.className.includes('sun') ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    }

    // DB Listeners
    db.ref('/').on('value', snap => {
        let d = snap.val();
        if(d) { inv = d.i || []; sales = d.s || []; ui(); }
    });

    function recalc() {
        let c = parseFloat(document.getElementById('cost').value)||0, d = parseFloat(document.getElementById('down').value)||0, m = parseInt(document.getElementById('months').value);
        let r = {6:0.38, 8:0.45, 12:0.56, 16:0.75}[m];
        let total = c + (c*r), mon = (total - d)/m;
        document.getElementById('mon-out').innerText = mon.toFixed(2) + " $";
        return { total, mon, d, m };
    }

    function save() {
        let n = document.getElementById('c-name').value, i = document.getElementById('item-sel').value;
        if(!n || !i) return alert("Pire bike!");
        let p = recalc();
        let idx = inv.findIndex(x => x.name === i);
        inv[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), down:p.d.toFixed(2), mon:p.mon.toFixed(2), months:p.m, paid:0 });
        db.ref('/').set({ i: inv, s: sales });
        document.getElementById('c-name').value = "";
    }

    function ui() {
        document.getElementById('c-inv').innerText = inv.reduce((a,b)=>a+b.qty,0);
        document.getElementById('c-cust').innerText = sales.length;
        let dbt=0, inc=0;
        sales.forEach(s => { 
            let p_v = parseFloat(s.down) + (s.paid * parseFloat(s.mon));
            inc += p_v; dbt += (parseFloat(s.total) - p_v);
        });
        document.getElementById('c-debt').innerText = dbt.toFixed(1) + "$";
        document.getElementById('c-inc').innerText = inc.toFixed(1) + "$";

        let sel = document.getElementById('item-sel'), tb = document.getElementById('tbody');
        sel.innerHTML = ''; inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        
        tb.innerHTML = '';
        sales.forEach(s => {
            let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon))).toFixed(1);
            tb.innerHTML += `<tr><td>${s.name}</td><td>${s.item}</td><td>${s.total}$</td><td>${rem}$</td>
            <td><button class="btn-tool" onclick="pay(${s.id})">+</button></td></tr>`;
        });
    }

    function pay(id) { let s=sales.find(x=>x.id===id); if(s.paid < s.months){ s.paid++; db.ref('/').set({i:inv, s:sales}); } }
    function openAdmin() { let p=prompt("Pass:"); if(p==="1234") document.getElementById('admin-modal').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
    function addSt() {
        let n=document.getElementById('st-name').value, q=parseInt(document.getElementById('st-qty').value);
        if(n&&q){ let f=inv.find(x=>x.name===n); if(f) f.qty+=q; else inv.push({name:n, qty:q}); db.ref('/').set({i:inv, s:sales}); }
    }
</script>
</body>
</html>
