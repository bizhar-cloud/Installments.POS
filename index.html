<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZHAR COMPUTER | PRO POS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827; --primary: #2563eb; --border: #d1d5db; --success: #10b981;
        }

        body.dark-mode {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #3b82f6; --border: #334155; --success: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; font-size: 13px; }

        header { 
            background: var(--card); height: 55px; padding: 0 12px; border-bottom: 3px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }

        .brand { font-weight: 900; font-size: 14px; color: var(--primary); }

        .btn-tool { 
            padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); 
            background: var(--bg); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 700;
        }

        .container { max-width: 1400px; margin: 8px auto; padding: 0 8px; display: grid; gap: 12px; }
        .pc-layout { grid-template-columns: 320px 1fr !important; }

        .card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        
        label { font-size: 11px; font-weight: 700; display: block; margin-top: 6px; }
        
        input, select { 
            width: 100%; padding: 8px; border: 2px solid var(--border); border-radius: 8px; 
            background: var(--card); color: var(--text); font-size: 13px; margin-top: 3px; 
            outline: none; appearance: auto;
        }

        .main-btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 900; 
            background: var(--primary); color: white; margin-top: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-item { background: var(--card); padding: 10px; border-radius: 10px; text-align: center; border-bottom: 3px solid var(--primary); }
        .stat-item h3 { font-size: 16px; color: var(--primary); margin-top: 2px; font-weight: 900; }

        .table-area { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .scroll-box { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 550px; }
        th { background: rgba(0,0,0,0.02); padding: 10px; text-align: inherit; font-weight: 800; border-bottom: 1px solid var(--border); font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; }

        #scanner-ui { width: 100%; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 8px; border: 2px solid var(--primary); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 12px; }

        /* Receipt Style */
        #receipt-box { 
            width: 80mm; background: #fff; color: #000; padding: 10px; font-family: 'Noto Sans Arabic', sans-serif;
            border: 1px dashed #ccc; display: none; margin: 0 auto;
        }
        .rec-head { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .rec-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .rec-total { border-top: 1px solid #000; margin-top: 10px; padding-top: 5px; font-weight: 900; }

        @media print {
            body * { visibility: hidden; }
            #receipt-box, #receipt-box * { visibility: visible; }
            #receipt-box { position: fixed; left: 0; top: 0; width: 100%; display: block !important; border: none; }
        }
    </style>
</head>
<body id="main-body">

<header>
    <div class="brand">BIZHAR COMPUTER</div>
    <div style="display: flex; gap: 6px;">
        <button class="btn-tool" onclick="togglePCMode()"><i class="fa-solid fa-desktop"></i></button>
        <button class="btn-tool" onclick="document.getElementById('inv-modal').style.display='flex'"><i class="fa-solid fa-plus"></i></button>
        <button class="btn-tool" onclick="toggleDark()"><i id="dark-icon" class="fa-solid fa-moon"></i></button>
    </div>
</header>

<div class="container" id="main-container">
    <div class="sidebar">
        <div class="card">
            <h4 style="font-weight: 900; color: var(--primary); font-size: 13px;">تۆمارکرنا وەسڵێ</h4>
            <div id="scanner-ui"></div>

            <label>ناڤێ کڕیاری</label>
            <input type="text" id="in-name" placeholder="...">

            <label>هەلبژارتنا ئامێری</label>
            <div style="display:flex; gap:5px;">
                <select id="in-item"></select>
                <button onclick="openScanner()" class="btn-tool" style="background:var(--primary); color:white;"><i class="fa-solid fa-barcode"></i></button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                <div><label>کڕین $</label><input type="number" id="in-buy" oninput="updateCalculation()"></div>
                <div><label>پێشەکی $</label><input type="number" id="in-down" oninput="updateCalculation()"></div>
            </div>

            <label>ماوێ قیستێ (هەیڤ)</label>
            <select id="in-months" onchange="updateCalculation()">
                <option value="6">6 Months</option>
                <option value="8">8 Months</option>
                <option value="10">10 Months</option>
                <option value="12">12 Months</option>
                <option value="14">14 Months</option>
                <option value="16">16 Months</option>
            </select>

            <div style="background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; margin-top: 10px; border: 2px dashed var(--primary);">
                <small style="font-weight:700; opacity:0.7; font-size: 10px;">قیستێ هەیڤانە</small>
                <div id="out-monthly" style="font-size: 18px; font-weight: 900; color: var(--primary);">$ 0.00</div>
            </div>

            <button class="main-btn" onclick="saveToCloud()"><i class="fa-solid fa-save"></i> <span>پاشکەفتکرن</span></button>
        </div>
    </div>

    <div class="content">
        <div class="stats-grid">
            <div class="stat-item"><small>مەخزەن</small><h3 id="v1">0</h3></div>
            <div class="stat-item"><small>کڕیار</small><h3 id="v2">0</h3></div>
            <div class="stat-item"><small>قەرز</small><h3 id="v3">0$</h3></div>
            <div class="stat-item" style="border-color: var(--success);"><small>قازانج</small><h3 id="v4" style="color: var(--success);">0$</h3></div>
        </div>

        <div class="table-area">
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr><th>کڕیار</th><th>ئامێر</th><th>گشتی</th><th>باقی</th><th>کردار</th></tr>
                    </thead>
                    <tbody id="sales-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="inv-modal">
    <div class="card" style="width:100%; max-width:350px;">
        <h4 style="margin-bottom:8px;">زێدەکرنا کالای</h4>
        <input type="text" id="add-n" placeholder="ناڤێ کالای">
        <input type="text" id="add-b" placeholder="بارکۆد">
        <input type="number" id="add-q" placeholder="ژمارە (Qty)">
        <div style="display:flex; gap:6px; margin-top:12px;">
            <button class="main-btn" onclick="addStock()" style="background:var(--success); margin:0;">زێدە بکە</button>
            <button class="main-btn" onclick="document.getElementById('inv-modal').style.display='none'" style="background:#64748b; margin:0;">داخستن</button>
        </div>
    </div>
</div>

<div id="receipt-box">
    <div class="rec-head">
        <h3 style="margin:0;">BIZHAR COMPUTER</h3>
        <small id="r-date"></small>
    </div>
    <div class="rec-row"><span>کڕیار:</span><span id="r-name"></span></div>
    <div class="rec-row"><span>ئامێر:</span><span id="r-item"></span></div>
    <div class="rec-row"><span>ماوێ قیستێ:</span><span id="r-months"></span></div>
    <div class="rec-row"><span>پێشەکی:</span><span id="r-down"></span></div>
    <div class="rec-row"><span>قیستێ هەیڤانە:</span><span id="r-mon"></span></div>
    <div class="rec-row rec-total"><span>کۆژمێ گشتی:</span><span id="r-total"></span></div>
    <div style="text-align:center; margin-top:15px; font-size:10px;">سوپاس بۆ سەرەدانا تە</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inventory = [], sales = [];

    function togglePCMode() { document.getElementById('main-container').classList.toggle('pc-layout'); }
    function toggleDark() { 
        document.body.classList.toggle('dark-mode'); 
        document.getElementById('dark-icon').className = document.body.classList.contains('dark-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    db.ref('/').on('value', snap => { const d = snap.val(); if(d) { inventory = d.i || []; sales = d.s || []; updateUI(); } });

    function updateCalculation() {
        let buy = parseFloat(document.getElementById('in-buy').value) || 0;
        let down = parseFloat(document.getElementById('in-down').value) || 0;
        let months = parseInt(document.getElementById('in-months').value);
        let rate = {6:0.38, 8:0.45, 10:0.52, 12:0.60, 14:0.68, 16:0.75}[months];
        let total = buy + (buy * rate);
        let monthly = (total - down) / months;
        document.getElementById('out-monthly').innerText = "$ " + monthly.toFixed(2);
        return { total, monthly, buy, down, months };
    }

    function saveToCloud() {
        let name = document.getElementById('in-name').value;
        let item = document.getElementById('in-item').value;
        if(!name || !item) return alert("Hەمی خانەیان پڕ بکە!");
        let p = updateCalculation();
        let idx = inventory.findIndex(x => x.name === item);
        inventory[idx].qty--;
        sales.unshift({ id: Date.now(), name, item, total: p.total.toFixed(2), buy: p.buy, down: p.down, mon: p.monthly.toFixed(2), months: p.months, paid: 0, date: new Date().toLocaleString('ku-IQ') });
        db.ref('/').set({ i: inventory, s: sales });
        document.getElementById('in-name').value = "";
    }

    function addStock() {
        let n = document.getElementById('add-n').value, b = document.getElementById('add-b').value, q = parseInt(document.getElementById('add-q').value);
        if(n && q) { inventory.push({ name: n, barcode: b, qty: q }); db.ref('/').set({ i: inventory, s: sales }); document.getElementById('inv-modal').style.display = 'none'; }
    }

    function updateUI() {
        document.getElementById('v1').innerText = inventory.reduce((a,b) => a + b.qty, 0);
        document.getElementById('v2').innerText = sales.length;
        let debt = 0, profit = 0;
        sales.forEach(s => {
            let remain = parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon));
            debt += remain; profit += (parseFloat(s.total) - parseFloat(s.buy));
        });
        document.getElementById('v3').innerText = debt.toFixed(1) + "$";
        document.getElementById('v4').innerText = profit.toFixed(1) + "$";
        let sel = document.getElementById('in-item');
        sel.innerHTML = '<option value="">...</option>';
        inventory.forEach(x => { if(x.qty > 0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });
        let list = document.getElementById('sales-body');
        list.innerHTML = '';
        sales.forEach(s => {
            let rem = (parseFloat(s.total) - parseFloat(s.down) - (s.paid * parseFloat(s.mon))).toFixed(1);
            list.innerHTML += `<tr><td><b>${s.name}</b></td><td>${s.item}</td><td>${s.total}$</td><td><b>${rem}$</b></td>
            <td><button class="btn-tool" onclick="payInst(${s.id})">+</button>
            <button class="btn-tool" onclick="printRec(${s.id})"><i class="fa-solid fa-print"></i></button></td></tr>`;
        });
    }

    function payInst(id) { let s = sales.find(x => x.id === id); if(s.paid < s.months) { s.paid++; db.ref('/').set({ i: inventory, s: sales }); } }
    
    function printRec(id) {
        let s = sales.find(x => x.id === id);
        document.getElementById('r-date').innerText = s.date;
        document.getElementById('r-name').innerText = s.name;
        document.getElementById('r-item').innerText = s.item;
        document.getElementById('r-months').innerText = s.months + " هەیڤ";
        document.getElementById('r-down').innerText = s.down + "$";
        document.getElementById('r-mon').innerText = s.mon + "$";
        document.getElementById('r-total').innerText = s.total + "$";
        window.print();
    }

    function openScanner() {
        document.getElementById('scanner-ui').style.display = 'block';
        let sc = new Html5QrcodeScanner("scanner-ui", { fps: 15, qrbox: 250 });
        sc.render((txt) => {
            let f = inventory.find(x => x.barcode === txt || x.name === txt);
            if(f) { document.getElementById('in-item').value = f.name; sc.clear(); document.getElementById('scanner-ui').style.display = 'none'; }
        });
    }
</script>
</body>
</html>
