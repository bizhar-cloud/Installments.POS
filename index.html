<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIZHAR COMPUTER | PRO POS SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --primary: #2563eb; 
            --neon-blue: #00d2ff; --neon-purple: #9d50bb; --border: #cbd5e1; --success: #10b981; --danger: #ef4444;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --primary: #3b82f6; 
            --neon-blue: #00f2ff; --neon-purple: #bd00ff; --border: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        header { 
            background: var(--card); height: 75px; padding: 0 20px; 
            border-bottom: 2px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }

        .brand { font-weight: 900; font-size: 22px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .settings-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--bg); color: var(--neon-blue); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid var(--neon-blue); font-size: 20px; transition: 0.3s; }

        /* Menu */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .menu-overlay.show { display: flex; }
        .dropdown-menu { background: var(--card); border-radius: 25px; width: 320px; padding: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid var(--neon-blue); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .menu-item { display: flex; align-items: center; gap: 15px; padding: 14px; border-radius: 15px; cursor: pointer; color: var(--text); border: none; background: none; width: 100%; text-align: inherit; font-weight: 700; transition: 0.2s; margin-bottom: 8px; }
        .menu-item:hover { background: var(--bg); color: var(--primary); transform: translateX(-5px); }

        .container { width: 100%; max-width: 1400px; margin: 25px auto; padding: 0 15px; }
        .pc-mode-active { display: grid !important; grid-template-columns: 380px 1fr !important; gap: 25px; }
        
        .card { background: var(--card); padding: 25px; border-radius: 22px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: var(--shadow); }
        
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); margin-top: 8px; outline: none; font-size: 15px; }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,210,255,0.1); }

        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--neon-blue)); color: white; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(37,99,235,0.2); }
        
        #reader-container { display: none; margin-bottom: 20px; border-radius: 20px; overflow: hidden; border: 4px solid var(--neon-blue); position: relative; box-shadow: 0 0 30px rgba(0,210,255,0.3); }
        .scan-close { position: absolute; top: 15px; right: 15px; z-index: 10; background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 900; }

        .table-wrap { background: var(--card); border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 16px; border-bottom: 1px solid var(--border); text-align: inherit; }
        th { background: var(--bg); color: var(--primary); font-size: 14px; }

        .btn-sm { width: 36px; height: 36px; border-radius: 10px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-sm:hover { transform: scale(1.1); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-box { padding: 20px; border-radius: 20px; background: var(--card); border-right: 5px solid var(--primary); box-shadow: var(--shadow); }

        /* Inventory Special Styles */
        .inventory-card { background: var(--card); border-radius: 30px; padding: 30px; border: 2px solid var(--neon-blue); width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .stock-badge { padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 900; }
        .low-stock { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .in-stock { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(10px); }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body id="app-body">

<header>
    <div style="width: 45px;"></div>
    <div class="brand">BIZHAR COMPUTER</div>
    <button class="settings-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()">
    <div class="dropdown-menu" onclick="event.stopPropagation()">
        <h4 id="m-header" style="text-align:center; color:var(--neon-blue); margin-bottom:15px;">SETTINGS</h4>
        <button class="menu-item" onclick="toggleLayout()"><i class="fa-solid fa-desktop"></i> <span id="m-pc">PC Mode</span></button>
        <button class="menu-item" onclick="toggleDark()"><i class="fa-solid fa-moon"></i> <span id="m-dark">Dark Mode</span></button>
        <button class="menu-item" onclick="exportData()"><i class="fa-solid fa-cloud-arrow-down"></i> <span id="m-backup">Backup</span></button>
        <button class="menu-item" onclick="showAddInv()"><i class="fa-solid fa-boxes-packing"></i> <span id="m-add">Inventory</span></button>
        <hr style="opacity: 0.1; margin: 15px 0;">
        <select id="lang-sel" onchange="applyLang()" style="height: 50px; border: 2px solid var(--neon-blue);">
            <option value="ku">کوردی (بادینی)</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="tr">Türkçe</option>
            <option value="fa">فارسی</option>
        </select>
        <button class="main-btn" onclick="toggleMenu()" id="btn-close" style="background:#475569;">CLOSE</button>
    </div>
</div>

<div class="container" id="app-container">
    <div id="side-p">
        <div class="card">
            <h3 id="t-form" style="margin-bottom:20px; color:var(--primary);"><i class="fa-solid fa-cart-plus"></i> NEW SALE</h3>
            
            <div id="reader-container">
                <button class="scan-close" onclick="stopScan()">X</button>
                <div id="reader"></div>
            </div>

            <label id="l-name">CUSTOMER NAME</label>
            <input type="text" id="i-name" placeholder="...">

            <label id="l-item" style="margin-top:15px; display:block;">SELECT DEVICE</label>
            <div style="display:flex; gap:8px;">
                <select id="i-item"></select>
                <button onclick="startScan('sale')" class="main-btn" style="margin-top:8px; width:60px; background:var(--text);"><i class="fa-solid fa-barcode"></i></button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
                <div><label id="l-buy">COST $</label><input type="number" id="i-buy" oninput="calc()"></div>
                <div><label id="l-down">DOWNPAY $</label><input type="number" id="i-down" oninput="calc()"></div>
            </div>

            <label id="l-duration" style="margin-top:15px; display:block;">PERIOD</label>
            <select id="i-months" onchange="calc()">
                <option value="6">6 Months (40%)</option>
                <option value="12">12 Months (55%)</option>
                <option value="16">16 Months (75%)</option>
            </select>

            <div style="display:flex; justify-content:space-between; margin-top:20px; background:var(--bg); padding:15px; border-radius:15px; border:1px dashed var(--neon-blue);">
                <div style="text-align:center;"><small id="l-total-box">TOTAL</small><div id="o-total" style="font-weight:900; font-size:18px;">$0</div></div>
                <div style="text-align:center;"><small id="l-mon">MONTHLY</small><div id="o-mon" style="font-weight:900; color:var(--primary); font-size:18px;">$0</div></div>
            </div>

            <button class="main-btn" onclick="saveSale()"><i class="fa-solid fa-floppy-disk"></i> <span id="b-save">SAVE</span></button>
        </div>
    </div>

    <div id="main-p">
        <div class="stat-grid">
            <div class="stat-box"><small id="s1">STOCK</small><h3 id="v1">0</h3></div>
            <div class="stat-box" style="border-color:var(--success);"><small id="s4">PROFIT</small><h3 id="v4" style="color:var(--success)">0$</h3></div>
        </div>
        
        <div style="display:flex; gap:12px; margin-bottom:20px;">
            <input type="text" id="search-input" placeholder="Search customer or item..." oninput="render()" style="margin-top:0;">
            <button onclick="startScan('search')" class="main-btn" style="margin:0; width:60px;"><i class="fa-solid fa-magnifying-glass-chart"></i></button>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr>
                    <th id="th1">CUSTOMER</th><th id="th2">ITEM</th><th id="th3">TOTAL</th><th id="th_down">DOWN</th><th id="th4">PAID</th><th id="th5">ACTION</th>
                </tr></thead>
                <tbody id="sales-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modal-inv">
    <div class="inventory-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 id="m-title" style="color:var(--neon-blue);"><i class="fa-solid fa-boxes-stacked"></i> INVENTORY</h2>
            <button onclick="document.getElementById('modal-inv').style.display='none'" style="background:none; border:none; color:var(--danger); font-size:30px; cursor:pointer;">&times;</button>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:15px; margin-bottom:20px;">
            <div><label style="font-size:12px; font-weight:700;">NAME</label><input type="text" id="add-name"></div>
            <div>
                <label style="font-size:12px; font-weight:700;">BARCODE</label>
                <div style="display:flex; gap:5px;"><input type="text" id="add-barcode"><button onclick="startScan('add')" class="main-btn" style="width:45px; margin-top:8px; height:45px;"><i class="fa-solid fa-barcode"></i></button></div>
            </div>
            <div><label style="font-size:12px; font-weight:700;">QTY</label><input type="number" id="add-qty" value="1"></div>
        </div>
        
        <button class="main-btn" id="btn-add-confirm" onclick="addInv()">ADD TO STOCK</button>

        <div style="margin-top:30px; border-radius:15px; overflow:hidden; border:1px solid var(--border);">
            <table style="min-width:100%; font-size:14px;">
                <thead style="background:var(--bg);"><tr><th>ITEM</th><th>BARCODE</th><th>QTY</th><th>X</th></tr></thead>
                <tbody id="inventory-list-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = { databaseURL: "https://bizhar-pos-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let inv = [], sales = [], scanner = null;

    const langs = {
        ku: { dir: "rtl", mhead: "ڕێکخستن", tform: "تۆمارکرنا نوی", lname: "ناڤێ کڕیاری", litem: "هەلبژارتنا ئامێری", lbuy: "بهایێ کڕینێ $", ldown: "پێشەکی $", lduration: "ماوێ قیستێ", lmon: "قیستا هەیڤانە", ltotal: "کۆمێ گشتی", bsave: "پاشکەفتکرن", s1: "کۆگە (پارچە)", s4: "کۆما قازانجی", th1: "کڕیار", th2: "ئامێر", th3: "کۆمێ گشتی", th_down: "پێشەکی", th4: "قیستێن دای", th5: "کردار", mpc: "مودێ کۆمپیوتەری", mdark: "مودێ تاریك", mbackup: "باکئەپ", madd: "مەخزەن", mtitle: "بڕێڤەبرنا مەخزەنی", bclose: "داخستن", bconf: "زێدە بکە" },
        en: { dir: "ltr", mhead: "SETTINGS", tform: "NEW SALE", lname: "CUSTOMER NAME", litem: "DEVICE", lbuy: "COST $", ldown: "DOWNPAY $", lduration: "PERIOD", lmon: "MONTHLY", ltotal: "TOTAL", bsave: "SAVE", s1: "STOCK", s4: "PROFIT", th1: "NAME", th2: "ITEM", th3: "TOTAL", th_down: "DOWN", th4: "PAID", th5: "ACTION", mpc: "PC MODE", mdark: "DARK MODE", mbackup: "BACKUP", madd: "INVENTORY", mtitle: "INVENTORY MGMT", bclose: "CLOSE", bconf: "ADD" },
        ar: { dir: "rtl", mhead: "الإعدادات", tform: "بيع جديد", lname: "اسم الزبون", litem: "الجهاز", lbuy: "سعر الشراء", ldown: "المقدمة", lduration: "الأشهر", lmon: "القسط", ltotal: "المجموع", bsave: "حفظ", s1: "المخزن", s4: "الربح", th1: "الزبون", th2: "الجهاز", th3: "المجموع", th_down: "المقدمة", th4: "الأقساط", th5: "إجراء", mpc: "وضع الحاسوب", mdark: "الوضع الليلي", mbackup: "نسخة", madd: "المخزن", mtitle: "إدارة المخزن", bclose: "إغلاق", bconf: "إضافة" },
        tr: { dir: "ltr", mhead: "AYARLAR", tform: "YENİ SATIŞ", lname: "MÜŞTERİ", litem: "CİHAZ", lbuy: "MALİYET", ldown: "PEŞİNAT", lduration: "AY", lmon: "AYLIK", ltotal: "TOPLAM", bsave: "KAYDET", s1: "STOK", s4: "KAR", th1: "İSİM", th2: "CİHAZ", th3: "TOPLAM", th_down: "PEŞİN", th4: "ÖDENEN", th5: "İŞLEM", mpc: "PC MODU", mdark: "KARANLIK MOD", mbackup: "YEDEKLE", madd: "ENVANTER", mtitle: "ENVANTER YÖNETİMİ", bclose: "KAPAT", bconf: "EKLE" },
        fa: { dir: "rtl", mhead: "تنظیمات", tform: "فروش جدید", lname: "نام مشتری", litem: "کالا", lbuy: "خرید", ldown: "پیش‌پرداخت", lduration: "ماه", lmon: "قسط", ltotal: "کل", bsave: "ذخیره", s1: "انبار", s4: "سود", th1: "مشتری", th2: "کالا", th3: "مجموع", th_down: "پیش", th4: "اقساط", th5: "عملیات", mpc: "حالت کامپیوتر", mdark: "حالت شب", mbackup: "پشتیبان", madd: "انبار", mtitle: "مدیریت انبار", bclose: "بستن", bconf: "افزودن" }
    };

    function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('show'); }
    function toggleLayout() { document.getElementById('app-container').classList.toggle('pc-mode-active'); toggleMenu(); }
    function toggleDark() { document.body.classList.toggle('dark-mode'); toggleMenu(); }
    
    function showAddInv() { 
        document.getElementById('modal-inv').style.display='flex'; 
        renderInventoryTable();
        toggleMenu(); 
    }

    function applyLang() {
        const l = langs[document.getElementById('lang-sel').value] || langs.ku;
        document.body.dir = l.dir;
        document.getElementById('m-header').innerText = l.mhead;
        document.getElementById('t-form').innerHTML = `<i class="fa-solid fa-cart-plus"></i> ${l.tform}`;
        document.getElementById('l-name').innerText = l.lname; 
        document.getElementById('l-item').innerText = l.litem;
        document.getElementById('l-buy').innerText = l.lbuy; 
        document.getElementById('l-down').innerText = l.ldown;
        document.getElementById('l-duration').innerText = l.lduration;
        document.getElementById('l-mon').innerText = l.lmon;
        document.getElementById('l-total-box').innerText = l.ltotal;
        document.getElementById('b-save').innerText = l.bsave; 
        document.getElementById('s1').innerText = l.s1;
        document.getElementById('s4').innerText = l.s4; 
        document.getElementById('th1').innerText = l.th1;
        document.getElementById('th2').innerText = l.th2; 
        document.getElementById('th3').innerText = l.th3;
        document.getElementById('th_down').innerText = l.th_down; 
        document.getElementById('th4').innerText = l.th4; 
        document.getElementById('th5').innerText = l.th5; 
        document.getElementById('m-pc').innerText = l.mpc; 
        document.getElementById('m-dark').innerText = l.mdark; 
        document.getElementById('m-backup').innerText = l.mbackup; 
        document.getElementById('m-add').innerText = l.madd; 
        document.getElementById('m-title').innerText = l.mtitle;
        document.getElementById('btn-close').innerText = l.bclose;
        document.getElementById('btn-add-confirm').innerText = l.bconf;
        render();
    }

    db.ref('/').on('value', snap => { const d = snap.val(); if(d){ inv=d.i||[]; sales=d.s||[]; render(); if(document.getElementById('modal-inv').style.display==='flex') renderInventoryTable(); } });

    function startScan(type) {
        document.getElementById('reader-container').style.display = 'block';
        if(scanner) scanner.clear();
        scanner = new Html5QrcodeScanner("reader", { fps: 25, qrbox: 250 });
        scanner.render((txt) => {
            if(type === 'sale') {
                let item = inv.find(x => x.barcode === txt);
                if(item) { document.getElementById('i-item').value = item.name; stopScan(); }
            } else if(type === 'search') {
                document.getElementById('search-input').value = txt; render(); stopScan();
            } else if(type === 'add') {
                document.getElementById('add-barcode').value = txt; stopScan();
            }
        });
    }

    function stopScan() { if(scanner) scanner.clear(); document.getElementById('reader-container').style.display = 'none'; }

    function calc() {
        let b = parseFloat(document.getElementById('i-buy').value)||0, d = parseFloat(document.getElementById('i-down').value)||0, m = parseInt(document.getElementById('i-months').value);
        let rates = {6:0.4, 12:0.55, 16:0.75};
        let total = b + (b * (rates[m]||0.4)), mon = (total - d) / m;
        document.getElementById('o-mon').innerText = "$" + (mon > 0 ? mon.toFixed(1) : 0);
        document.getElementById('o-total').innerText = "$" + total.toFixed(1);
        return { total, mon, b, d, m };
    }

    function render() {
        document.getElementById('v1').innerText = inv.reduce((a,b)=>a+parseInt(b.qty),0);
        let pro = 0, q = document.getElementById('search-input').value.toLowerCase();
        sales.forEach(s => pro += (parseFloat(s.total) - parseFloat(s.buy)));
        document.getElementById('v4').innerText = pro.toFixed(0) + "$";
        
        let sel = document.getElementById('i-item');
        sel.innerHTML = '<option value="">...</option>';
        inv.forEach(x => { if(x.qty>0) sel.innerHTML += `<option value="${x.name}">${x.name} (${x.qty})</option>`; });

        let list = document.getElementById('sales-list');
        list.innerHTML = '';
        sales.filter(s => s.name.toLowerCase().includes(q) || s.item.toLowerCase().includes(q)).forEach(s => {
            list.innerHTML += `<tr>
                <td><b>${s.name}</b><br><small style="opacity:0.5">${s.date}</small></td><td>${s.item}</td><td>${s.total}$</td><td>${s.down}$</td><td><b style="color:var(--neon-blue)">${s.paid}</b>/${s.months}</td>
                <td class="action-btns">
                    <button onclick="pay(${s.id})" class="btn-sm" style="background:var(--success)"><i class="fa-solid fa-plus"></i></button>
                    <button onclick="delS(${s.id})" class="btn-sm" style="background:var(--danger)"><i class="fa-solid fa-trash-can"></i></button>
                </td></tr>`;
        });
    }

    function renderInventoryTable() {
        const body = document.getElementById('inventory-list-body');
        body.innerHTML = '';
        inv.forEach((item, idx) => {
            const status = item.qty <= 2 ? 'low-stock' : 'in-stock';
            body.innerHTML += `<tr>
                <td style="font-weight:700;">${item.name}</td>
                <td style="font-family:monospace; font-size:12px;">${item.barcode || '--'}</td>
                <td><span class="stock-badge ${status}">${item.qty}</span></td>
                <td><i class="fa-solid fa-xmark" onclick="deleteInvItem(${idx})" style="color:var(--danger); cursor:pointer;"></i></td>
            </tr>`;
        });
    }

    function saveSale() {
        let n = document.getElementById('i-name').value, i = document.getElementById('i-item').value;
        if(!n || !i) return alert("Hivye nave kriari u amiri diyar bka!");
        let p = calc(), idx = inv.findIndex(x => x.name === i);
        if(idx!==-1) inv[idx].qty--;
        sales.unshift({ id:Date.now(), name:n, item:i, total:p.total.toFixed(2), buy:p.b, down:p.d, mon:p.mon.toFixed(2), months:p.m, paid:0, date:new Date().toLocaleDateString() });
        db.ref('/').set({ i: inv, s: sales });
        document.getElementById('i-name').value = "";
    }

    function addInv() {
        let n = document.getElementById('add-name').value, b = document.getElementById('add-barcode').value, q = document.getElementById('add-qty').value;
        if(n && q){ inv.push({name:n, barcode:b, qty:q}); db.ref('/').set({i:inv, s:sales}); document.getElementById('add-name').value=""; document.getElementById('add-barcode').value=""; }
    }

    function deleteInvItem(idx) { if(confirm("Delete item?")){ inv.splice(idx,1); db.ref('/').set({i:inv, s:sales}); } }
    function pay(id) { let s=sales.find(x=>x.id===id); if(s && s.paid < s.months){ s.paid++; db.ref('/').set({i:inv, s:sales}); } }
    function delS(id) { if(confirm("Sure?")){ sales=sales.filter(x=>x.id!==id); db.ref('/').set({i:inv, s:sales}); } }
    function exportData() { let data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({i:inv, s:sales})); let a=document.createElement('a'); a.href=data; a.download="BIZHAR_POS_BACKUP.json"; a.click(); }

    applyLang();
</script>
</body>
</html>
